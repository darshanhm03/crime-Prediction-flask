<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: url("/static/bg.jpg") no-repeat center center/cover;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
        }

        .signup-box {
            position: relative;
            z-index: 1;
            width: 350px;
            padding: 30px;
            border-radius: 15px;

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);

            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            color: white;
            text-align: center;
        }

        .input-box {
            margin: 15px 0;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00b4d8, #0077b6);
            color: white;
            cursor: pointer;
        }

        a {
            color: #00b4d8;
            text-decoration: none;
        }
    </style>

</head>
<body>

<div class="signup-box">
    <h2>📝 Create Account</h2>

    <form action="/register" method="POST">
        <div class="input-box">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn">Signup</button>
    </form>

    <p style="margin-top:10px;">
        Already have an account? <a href="/">Login</a>
    </p>
</div>

</body>
</html>
